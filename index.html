<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Animation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            gap: 20px;
        }
        canvas {
            border: 2px solid #fff;
        }
        #infoPanel {
            background: #222;
            border: 2px solid #fff;
            padding: 20px;
            width: 220px;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .game-instructions {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #444;
            font-size: 12px;
            color: #888;
        }
        .game-instructions h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 13px;
        }
        .game-instructions ul {
            margin: 0;
            padding-left: 15px;
            list-style-type: disc;
        }
        .game-instructions li {
            margin-bottom: 5px;
        }
        .key {
            color: #4af;
            font-weight: bold;
        }
        .stat-row {
            margin-bottom: 15px;
        }
        .stat-label {
            font-size: 14px;
            color: #aaa;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }
        .stat-charge {
            display: none;
        }
        .stat-charge.active {
            display: block;
        }
        .stat-charge .stat-label {
            color: #4af;
        }
    </style>
</head>
<body>
    <div id="infoPanel">
        <div class="stat-row">
            <div class="stat-label">等級</div>
            <div class="stat-value" id="statLevel">1/10</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">生命力</div>
            <div class="stat-value" id="statHp">20/20</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">攻擊力</div>
            <div class="stat-value" id="statAtk">5</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">經驗值</div>
            <div class="stat-value" id="statExp">0/50</div>
        </div>
        <div class="stat-row">
            <div class="stat-label">擊殺蒲公獸</div>
            <div class="stat-value" id="statKill">0</div>
        </div>
        <div class="stat-row stat-charge">
            <div class="stat-label">集氣回復中</div>
        </div>
        <div class="game-instructions">
            <h3>遊戲說明</h3>
            <ul>
                <li><span class="key">方向鍵</span>：移動</li>
                <li><span class="key">空白鍵</span>：攻擊</li>
                <li><span class="key">Z 鍵</span>：集氣回血</li>
            </ul>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const CONFIG = {
            CANVAS_WIDTH: 600,
            CANVAS_HEIGHT: 600,
            FRAME_SIZE: 64,
            ANIMATION_SPEED: 150,
            BASE_ATTACK_INTERVAL: 3000,
            MOVE_SPEED: 2,
            SEED_SPEED: 3,
            PLAYER_SPEED: 3,
            PLAYER_BULLET_SPEED: 8,
            PLAYER_BULLET_SIZE: 8,
            SEED_SIZE: 3,
            MAX_LEVEL: 10,
            ENEMY_SPAWN_POSITIONS: [
                { x: 128, y: 256 },
                { x: 256, y: 256 },
                { x: 512, y: 256 },
                { x: 64, y: 320 },
                { x: 192, y: 320 },
                { x: 448, y: 320 }
            ],
            POISON_MONSTER_POSITIONS: [
                { x: 150, y: 380 },
                { x: 250, y: 380 },
                { x: 350, y: 380 }
            ]
        };

        const AssetManager = {
            images: {},
            loadCount: 0,
            totalImages: 0,

            load(name, src) {
                const img = new Image();
                img.src = src;
                this.images[name] = img;
                this.totalImages++;
                img.onload = () => {
                    this.loadCount++;
                };
                return img;
            },

            isReady() {
                return this.loadCount === this.totalImages;
            }
        };

        const Input = {
            up: false,
            down: false,
            left: false,
            right: false,
            space: false,
            z: false,

            init() {
                document.addEventListener('keydown', this.onKeyDown.bind(this));
                document.addEventListener('keyup', this.onKeyUp.bind(this));
            },

            onKeyDown(e) {
                switch(e.key) {
                    case 'ArrowUp': this.up = true; break;
                    case 'ArrowDown': this.down = true; break;
                    case 'ArrowLeft': this.left = true; break;
                    case 'ArrowRight': this.right = true; break;
                    case ' ':
                        if (!this.space && Game.running) {
                            this.space = true;
                            Game.player.startAttack();
                        }
                        break;
                    case 'z':
                    case 'Z':
                        if (!this.z && Game.running && !Game.player.isAttacking) {
                            this.z = true;
                            Game.player.startCharge();
                        }
                        break;
                }
                e.preventDefault();
            },

            onKeyUp(e) {
                switch(e.key) {
                    case 'ArrowUp': this.up = false; break;
                    case 'ArrowDown': this.down = false; break;
                    case 'ArrowLeft': this.left = false; break;
                    case 'ArrowRight': this.right = false; break;
                    case ' ': this.space = false; break;
                    case 'z':
                    case 'Z': this.z = false; break;
                }
                e.preventDefault();
            },

            isMoving() {
                return this.up || this.down || this.left || this.right;
            }
        };

        const Player = {
            x: 0,
            y: 0,
            frame: 0,
            action: 'idle',
            lastFrameTime: 0,
            isAttacking: false,
            attackFrame: 0,
            attackTimer: 0,
            isCharging: false,
            chargeFrame: 0,
            chargeTimer: 0,
            hp: 20,
            maxHp: 20,
            attack: 5,
            exp: 0,
            level: 1,
            nextLevelExp: 50,

            init() {
                this.x = CONFIG.CANVAS_WIDTH / 2 - CONFIG.FRAME_SIZE / 2;
                this.y = CONFIG.CANVAS_HEIGHT - CONFIG.FRAME_SIZE - 20;
                this.reset();
            },

            reset() {
                this.hp = 20;
                this.maxHp = 20;
                this.attack = 5;
                this.exp = 0;
                this.level = 1;
                this.nextLevelExp = 50;
                this.isAttacking = false;
                this.isCharging = false;
                this.action = 'idle';
                this.frame = 0;
            },

            startAttack() {
                this.isAttacking = true;
                this.attackFrame = 0;
                this.attackTimer = 0;
            },

            startCharge() {
                this.isCharging = true;
                this.chargeFrame = 0;
                this.chargeTimer = 0;
            },

            update(currentTime) {
                if (this.isCharging) {
                    this.updateCharging(currentTime);
                } else if (this.isAttacking) {
                    this.updateAttacking(currentTime);
                } else if (Input.isMoving()) {
                    this.updateMoving(currentTime);
                } else {
                    this.updateIdle(currentTime);
                }
            },

            updateCharging(currentTime) {
                this.action = 'charge';
                this.chargeTimer += 16;
                this.chargeFrame = Math.floor(this.chargeTimer / CONFIG.ANIMATION_SPEED);

                if (this.chargeFrame >= 4) {
                    this.hp = Math.min(this.hp + 1, this.maxHp);
                    this.chargeFrame = 0;

                    if (this.hp >= this.maxHp) {
                        this.isCharging = false;
                        this.chargeTimer = 0;
                    }
                }

                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }
            },

            updateAttacking(currentTime) {
                this.action = 'attack';
                this.attackTimer += 16;
                this.attackFrame = Math.floor(this.attackTimer / CONFIG.ANIMATION_SPEED);

                if (this.attackFrame === 1 && this.attackTimer < CONFIG.ANIMATION_SPEED + 20) {
                    Game.spawnPlayerBullet();
                }

                if (this.attackFrame >= 4) {
                    this.isAttacking = false;
                    this.attackFrame = 0;
                    this.attackTimer = 0;
                }

                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }
            },

            updateMoving(currentTime) {
                this.action = 'move';

                if (Input.up) this.y -= CONFIG.PLAYER_SPEED;
                if (Input.down) this.y += CONFIG.PLAYER_SPEED;
                if (Input.left) this.x -= CONFIG.PLAYER_SPEED;
                if (Input.right) this.x += CONFIG.PLAYER_SPEED;

                this.x = this.clamp(this.x, 0, CONFIG.CANVAS_WIDTH - CONFIG.FRAME_SIZE);
                this.y = this.clamp(this.y, 0, CONFIG.CANVAS_HEIGHT - CONFIG.FRAME_SIZE);

                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }
            },

            updateIdle(currentTime) {
                this.action = 'idle';

                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }
            },

            clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            },

            getSpriteFrame() {
                const actions = {
                    idle: { row: 0, frames: 4 },
                    move: { row: 1, frames: 4 },
                    attack: { row: 2, frames: 4 },
                    charge: { row: 3, frames: 4 }
                };
                const { row, frames } = actions[this.action] || actions.idle;
                const col = this.frame % frames;
                return { col, row };
            }
        };

        class Enemy {
            constructor(x, y, level) {
                this.x = x;
                this.y = y;
                this.frame = 0;
                this.action = 'idle';
                this.lastFrameTime = 0;
                this.lastAttackTime = 0;
                this.direction = 1;
                this.isMoving = true;
                this.hp = 10 + (level - 1) * 10;
                this.maxHp = this.hp;
                this.attack = 5 + (level - 1) * 5;
            }

            update(currentTime) {
                const attackInterval = Math.max(1000, CONFIG.BASE_ATTACK_INTERVAL - (Game.player.level - 1) * 200);

                if (this.action === 'idle') {
                    if (currentTime - this.lastAttackTime > attackInterval) {
                        this.action = 'attack';
                        this.frame = 0;
                        this.lastFrameTime = currentTime;
                        this.isMoving = false;
                    } else {
                        this.updateIdle(currentTime);
                    }
                } else if (this.action === 'attack') {
                    this.updateAttacking(currentTime);
                }
            }

            updateIdle(currentTime) {
                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }

                if (this.isMoving) {
                    this.x += CONFIG.MOVE_SPEED * this.direction;

                    if (this.x <= 0) {
                        this.x = 0;
                        this.direction = 1;
                    } else if (this.x >= CONFIG.CANVAS_WIDTH - CONFIG.FRAME_SIZE) {
                        this.x = CONFIG.CANVAS_WIDTH - CONFIG.FRAME_SIZE;
                        this.direction = -1;
                    }
                }
            }

            updateAttacking(currentTime) {
                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;

                    if (this.frame === 1) {
                        Game.spawnSeed(this.x + CONFIG.FRAME_SIZE / 2, this.y + CONFIG.FRAME_SIZE / 2, this.attack);
                    }

                    if (this.frame >= 2) {
                        this.action = 'idle';
                        this.frame = 0;
                        this.lastAttackTime = currentTime;
                        this.isMoving = true;
                    }
                }
            }

            getSpriteFrame() {
                const row = this.action === 'attack' ? 0 : 1;
                const col = this.frame % 2;
                return { col, row };
            }
        }

        class PoisonMonster {
            constructor(x, y, index) {
                this.startX = x;
                this.startY = y;
                this.x = x;
                this.y = y;
                this.frame = 0;
                this.lastFrameTime = 0;
                this.direction = 1;
                this.speed = 0.5;
                this.hp = 100;
                this.maxHp = 100;
                this.attack = 100;
                this.index = index;
                this.active = false;
                this.isDead = false;
            }

            activate() {
                this.x = this.startX;
                this.y = this.startY;
                this.hp = this.maxHp;
                this.frame = 0;
                this.direction = 1;
                this.active = true;
                this.isDead = false;
            }

            update(currentTime) {
                if (!this.active) return;

                this.x += this.speed * this.direction;

                if (this.x <= 0) {
                    this.x = 0;
                    this.direction = 1;
                } else if (this.x >= CONFIG.CANVAS_WIDTH - CONFIG.FRAME_SIZE) {
                    this.x = CONFIG.CANVAS_WIDTH - CONFIG.FRAME_SIZE;
                    this.direction = -1;
                }

                if (currentTime - this.lastFrameTime > CONFIG.ANIMATION_SPEED) {
                    this.frame++;
                    this.lastFrameTime = currentTime;
                }
            }

            getSpriteFrame() {
                const row = 0;
                const col = this.frame % 4;
                return { col, row };
            }
        }

        const Game = {
            running: false,
            player: Player,
            enemies: [],
            seeds: [],
            bullets: [],
            killCount: 0,
            poisonMonsters: [],

            init() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = CONFIG.CANVAS_WIDTH;
                this.canvas.height = CONFIG.CANVAS_HEIGHT;

    AssetManager.load('player', 'T2.png');
    AssetManager.load('enemy', 'pus.png');
    AssetManager.load('bg', 'GAMEBKG.png');
    AssetManager.load('poison', 'Posion.png');

                Input.init();
                this.player.init();
                this.poisonMonsters = CONFIG.POISON_MONSTER_POSITIONS.map(
                    (pos, index) => new PoisonMonster(pos.x, pos.y, index)
                );
                this.spawnEnemies();
                this.spawnPoisonMonsters();

                const checkReady = () => {
                    if (AssetManager.isReady()) {
                        this.running = true;
                        requestAnimationFrame(this.loop.bind(this));
                    } else {
                        setTimeout(checkReady, 100);
                    }
                };
                checkReady();
            },

            spawnEnemies() {
                this.enemies = CONFIG.ENEMY_SPAWN_POSITIONS.map(
                    pos => new Enemy(pos.x, pos.y, this.player.level)
                );
            },

            spawnPoisonMonsters() {
                const allDead = this.poisonMonsters.every(pm => pm.isDead);
                const anyActive = this.poisonMonsters.some(pm => pm.active);

                if (allDead || !anyActive) {
                    this.poisonMonsters.forEach(pm => pm.activate());
                }
            },

            spawnPlayerBullet() {
                this.bullets.push({
                    x: this.player.x + CONFIG.FRAME_SIZE / 2,
                    y: this.player.y + CONFIG.FRAME_SIZE / 2
                });
            },

            spawnSeed(x, y, damage) {
                this.seeds.push({ x, y, damage });
            },

            checkPlayerLevelUp() {
                while (this.player.exp >= this.player.nextLevelExp && this.player.level < CONFIG.MAX_LEVEL) {
                    this.player.exp -= this.player.nextLevelExp;
                    this.player.level++;
                    this.player.maxHp += 5;
                    this.player.attack += 5;
                    this.player.nextLevelExp *= 2;
                }
            },

            update(currentTime) {
                if (!this.running) return;

                this.player.update(currentTime);
                this.poisonMonsters.forEach(pm => pm.update(currentTime));

                this.enemies.forEach(enemy => enemy.update(currentTime));
                this.updateSeeds();
                this.updateBullets();
                this.checkPoisonCollision();

                this.poisonMonsters.forEach(pm => {
                    if (pm.active && pm.hp <= 0) {
                        pm.active = false;
                        pm.isDead = true;
                        this.player.exp += 50;
                        this.killCount++;
                        this.checkPlayerLevelUp();
                    }
                });

                if (this.player.hp <= 0) {
                    this.player.hp = 0;
                    this.running = false;
                }

                this.updateUI();
            },

            updateSeeds() {
                for (let i = this.seeds.length - 1; i >= 0; i--) {
                    const seed = this.seeds[i];
                    seed.y += CONFIG.SEED_SPEED;

                    let hitPoisonMonster = false;
                    for (const pm of this.poisonMonsters) {
                        if (pm.active) {
                            const pmX = pm.x + CONFIG.FRAME_SIZE / 2;
                            const pmY = pm.y + CONFIG.FRAME_SIZE / 2;
                            const dx = seed.x - pmX;
                            const dy = seed.y - pmY;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist < CONFIG.FRAME_SIZE / 2) {
                                pm.hp -= seed.damage;
                                this.seeds.splice(i, 1);
                                hitPoisonMonster = true;

                                if (pm.hp <= 0) {
                                    pm.active = false;
                                    pm.isDead = true;
                                    this.player.exp += 50;
                                    this.killCount++;
                                    this.checkPlayerLevelUp();
                                }
                                break;
                            }
                        }
                    }

                    if (hitPoisonMonster) continue;

                    const dx = seed.x - (this.player.x + CONFIG.FRAME_SIZE / 2);
                    const dy = seed.y - (this.player.y + CONFIG.FRAME_SIZE / 2);
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONFIG.FRAME_SIZE / 2) {
                        const damage = this.player.isCharging ? seed.damage * 2 : seed.damage;
                        this.player.hp -= damage;
                        if (this.player.isCharging) {
                            this.player.isCharging = false;
                            this.player.chargeTimer = 0;
                        }
                        this.seeds.splice(i, 1);
                        continue;
                    }

                    if (seed.y > CONFIG.CANVAS_HEIGHT) {
                        this.seeds.splice(i, 1);
                    }
                }
            },

            updateBullets() {
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    bullet.y -= CONFIG.PLAYER_BULLET_SPEED;

                    if (bullet.y < 0) {
                        this.bullets.splice(i, 1);
                        continue;
                    }

                    let hitPoisonMonster = false;
                    for (const pm of this.poisonMonsters) {
                        if (pm.active && this.bullets[i]) {
                            const pmX = pm.x + CONFIG.FRAME_SIZE / 2;
                            const pmY = pm.y + CONFIG.FRAME_SIZE / 2;
                            const dx = bullet.x - pmX;
                            const dy = bullet.y - pmY;
                            const dist = Math.sqrt(dx * dx + dy * dy);

                            if (dist < CONFIG.FRAME_SIZE / 2) {
                                pm.hp -= this.player.attack;
                                this.bullets.splice(i, 1);
                                hitPoisonMonster = true;

                                if (pm.hp <= 0) {
                                    pm.active = false;
                                    pm.isDead = true;
                                    this.player.exp += 50;
                                    this.killCount++;
                                    this.checkPlayerLevelUp();
                                }
                                break;
                            }
                        }
                    }

                    if (hitPoisonMonster) continue;

                    for (let j = this.enemies.length - 1; j >= 0; j--) {
                        const enemy = this.enemies[j];
                        const dx = bullet.x - (enemy.x + CONFIG.FRAME_SIZE / 2);
                        const dy = bullet.y - (enemy.y + CONFIG.FRAME_SIZE / 2);
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < CONFIG.FRAME_SIZE / 2) {
                            enemy.hp -= this.player.attack;
                            this.bullets.splice(i, 1);

                            if (enemy.hp <= 0) {
                                this.player.exp += enemy.attack;
                                this.killCount++;
                                this.checkPlayerLevelUp();
                                this.enemies.splice(j, 1);

                                if (this.enemies.length === 0) {
                                    this.spawnEnemies();
                                }
                            }
                            break;
                        }
                    }
                }
            },

            checkPoisonCollision() {
                const playerX = this.player.x + CONFIG.FRAME_SIZE / 2;
                const playerY = this.player.y + CONFIG.FRAME_SIZE / 2;

                for (const pm of this.poisonMonsters) {
                    if (!pm.active) continue;

                    const pmX = pm.x + CONFIG.FRAME_SIZE / 2;
                    const pmY = pm.y + CONFIG.FRAME_SIZE / 2;

                    const dx = playerX - pmX;
                    const dy = playerY - pmY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONFIG.FRAME_SIZE / 2) {
                        this.player.hp -= pm.attack;
                        pm.hp -= this.player.attack;

                        if (pm.hp <= 0) {
                            pm.active = false;
                            pm.isDead = true;
                            this.player.exp += 50;
                            this.killCount++;
                            this.checkPlayerLevelUp();
                        }
                    }

                    for (let i = this.enemies.length - 1; i >= 0; i--) {
                        const enemy = this.enemies[i];
                        const ex = enemy.x + CONFIG.FRAME_SIZE / 2;
                        const ey = enemy.y + CONFIG.FRAME_SIZE / 2;
                        const edx = ex - pmX;
                        const edy = ey - pmY;
                        const edist = Math.sqrt(edx * edx + edy * edy);

                        if (edist < CONFIG.FRAME_SIZE / 2) {
                            enemy.hp -= pm.attack;
                            pm.hp -= enemy.attack;

                            if (enemy.hp <= 0) {
                                this.player.exp += enemy.attack;
                                this.killCount++;
                                this.checkPlayerLevelUp();
                                this.enemies.splice(i, 1);

                                if (this.enemies.length === 0) {
                                    this.spawnEnemies();
                                }
                            }

                            if (pm.hp <= 0) {
                                pm.active = false;
                                pm.isDead = true;
                                this.player.exp += 50;
                                this.killCount++;
                                this.checkPlayerLevelUp();
                                break;
                            }
                        }
                    }
                }
            },

            draw() {
                this.ctx.drawImage(AssetManager.images.bg, 0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                const { col: pCol, row: pRow } = this.player.getSpriteFrame();
                this.ctx.drawImage(
                    AssetManager.images.player,
                    pCol * CONFIG.FRAME_SIZE, pRow * CONFIG.FRAME_SIZE,
                    CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE,
                    this.player.x, this.player.y,
                    CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE
                );

                this.enemies.forEach(enemy => {
                    const { col, row } = enemy.getSpriteFrame();
                    this.ctx.drawImage(
                        AssetManager.images.enemy,
                        col * CONFIG.FRAME_SIZE, row * CONFIG.FRAME_SIZE,
                        CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE,
                        enemy.x, enemy.y,
                        CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE
                    );
                });

                this.poisonMonsters.forEach(pm => {
                    if (pm.active) {
                        const { col, row } = pm.getSpriteFrame();
                        this.ctx.drawImage(
                            AssetManager.images.poison,
                            col * CONFIG.FRAME_SIZE, row * CONFIG.FRAME_SIZE,
                            CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE,
                            pm.x, pm.y,
                            CONFIG.FRAME_SIZE, CONFIG.FRAME_SIZE
                        );
                    }
                });

                this.seeds.forEach(seed => {
                    this.ctx.beginPath();
                    this.ctx.arc(seed.x, seed.y, CONFIG.SEED_SIZE, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.fill();
                });

                this.bullets.forEach(bullet => {
                    this.ctx.beginPath();
                    this.ctx.arc(bullet.x, bullet.y, CONFIG.PLAYER_BULLET_SIZE, 0, Math.PI * 2);
                    this.ctx.fillStyle = '#FFD700';
                    this.ctx.fill();
                });

                if (!this.running) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = '48px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('GAME OVER', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2);
                    this.ctx.font = '24px Arial';
                    this.ctx.fillText(`最終等級：${this.player.level}`, CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 50);
                    this.ctx.fillText(`擊殺數：${this.killCount}`, CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 90);
                    this.ctx.textAlign = 'left';
                }
            },

            updateUI() {
                document.getElementById('statLevel').textContent = `${this.player.level}/${CONFIG.MAX_LEVEL}`;
                document.getElementById('statHp').textContent = `${this.player.hp}/${this.player.maxHp}`;
                document.getElementById('statAtk').textContent = this.player.attack;
                document.getElementById('statExp').textContent = `${this.player.exp}/${this.player.nextLevelExp}`;
                document.getElementById('statKill').textContent = this.killCount;

                const chargeEl = document.querySelector('.stat-charge');
                if (chargeEl) {
                    chargeEl.classList.toggle('active', this.player.isCharging);
                }
            },

            loop(currentTime) {
                this.update(currentTime);
                this.draw();

                const allDead = this.poisonMonsters.every(pm => pm.isDead);
                const anyActive = this.poisonMonsters.some(pm => pm.active);

                if (allDead || !anyActive) {
                    this.spawnPoisonMonsters();
                }

                requestAnimationFrame(this.loop.bind(this));
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
