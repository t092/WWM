<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>武林萌傳 - 遊戲入口</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Microsoft YaHei', '微軟正黑體', Arial, sans-serif;
}

h1 {
  color: #fff;
  font-size: 48px;
  margin-bottom: 30px;
  text-shadow: 0 0 20px #f00, 0 0 40px #f00;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from {
    text-shadow: 0 0 20px #f00, 0 0 40px #f00;
  }
  to {
    text-shadow: 0 0 30px #f00, 0 0 60px #f00;
  }
}

.video-container {
  margin-bottom: 30px;
}

video {
  width: 800px;
  height: 450px;
  border: 3px solid #333;
  border-radius: 10px;
}

.start-btn {
  background: linear-gradient(145deg, #ff4444, #cc0000);
  color: #fff;
  border: none;
  padding: 15px 50px;
  font-size: 24px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
}

.start-btn:hover {
  background: linear-gradient(145deg, #ff6666, #ff0000);
  transform: scale(1.1);
  box-shadow: 0 7px 20px rgba(255, 0, 0, 0.6);
}

.start-btn:active {
  transform: scale(0.95);
}
</style>
</head>
<body>
<h1>武林萌傳</h1>

<div class="video-container">
  <video id="openingVideo" muted>
    <source src="WWMOPENINGs.mp4" type="video/mp4">
    您的瀏覽器不支援影片播放。
  </video>
</div>

<button class="start-btn" onclick="startGame()">開始遊戲</button>

<script>
const video = document.getElementById('openingVideo');

// 自動播放影片
video.play().catch(e => {
  console.log('Autoplay prevented:', e);
});

// 讓影片循環播放
video.addEventListener('ended', () => {
  video.currentTime = 0;
  video.play();
});

function startGame() {
  window.location.href = 'GameLV1.html';
}
</script>
</body>
</html>
