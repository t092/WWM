<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enemy Animation Test</title>
<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #333;
}
canvas {
  border: 2px solid #fff;
}
</style>
</head>
<body>
<canvas id="gameCanvas" width="600" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const enemySprite = new Image();
enemySprite.src = 'pus.png';

const FRAME_SIZE = 64;
const ANIMATION_SPEED = 150;
const ATTACK_INTERVAL = 3000;
const MOVE_SPEED = 2;
const SEED_SPEED = 3;
const SEED_SIZE = 3;

let enemies = [
  {
    x: 128,
    y: 128,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  },
  {
    x: 256,
    y: 128,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  },
  {
    x: 512,
    y: 128,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  },
  {
    x: 64,
    y: 192,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  },
  {
    x: 192,
    y: 192,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  },
  {
    x: 448,
    y: 192,
    frame: 0,
    action: 'idle',
    lastFrameTime: 0,
    lastAttackTime: 0,
    direction: 1,
    isMoving: true
  }
];

let seeds = [];

function drawGrid() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;

  for (let x = 0; x <= canvas.width; x += 64) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 0; y <= canvas.height; y += 64) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function getEnemySpriteFrame(action, frameIndex) {
  let col, row;
  
  if (action === 'attack') {
    col = frameIndex % 2;
    row = 0;
  } else {
    col = frameIndex % 2;
    row = 1;
  }
  
  return { col, row };
}

function updateEnemy(enemy, currentTime) {
  if (enemy.action === 'idle') {
    if (currentTime - enemy.lastAttackTime > ATTACK_INTERVAL) {
      enemy.action = 'attack';
      enemy.frame = 0;
      enemy.lastFrameTime = currentTime;
      enemy.isMoving = false;
    } else {
      if (currentTime - enemy.lastFrameTime > ANIMATION_SPEED) {
        enemy.frame++;
        enemy.lastFrameTime = currentTime;
      }
      
      if (enemy.isMoving) {
        enemy.x += MOVE_SPEED * enemy.direction;
        
        if (enemy.x <= 0) {
          enemy.x = 0;
          enemy.direction = 1;
        } else if (enemy.x >= canvas.width - FRAME_SIZE) {
          enemy.x = canvas.width - FRAME_SIZE;
          enemy.direction = -1;
        }
      }
    }
  } else if (enemy.action === 'attack') {
    if (currentTime - enemy.lastFrameTime > ANIMATION_SPEED) {
      enemy.frame++;
      enemy.lastFrameTime = currentTime;
      
      if (enemy.frame === 1) {
        seeds.push({
          x: enemy.x + FRAME_SIZE / 2,
          y: enemy.y + FRAME_SIZE
        });
      }
      
      if (enemy.frame >= 2) {
        enemy.action = 'idle';
        enemy.frame = 0;
        enemy.lastAttackTime = currentTime;
        enemy.isMoving = true;
      }
    }
  }
}

function updateSeeds() {
  for (let i = seeds.length - 1; i >= 0; i--) {
    seeds[i].y += SEED_SPEED;
    
    if (seeds[i].y > canvas.height) {
      seeds.splice(i, 1);
    }
  }
}

function update(currentTime) {
  for (const enemy of enemies) {
    updateEnemy(enemy, currentTime);
  }
  
  updateSeeds();
}

function draw() {
  drawGrid();

  for (const enemy of enemies) {
    const { col, row } = getEnemySpriteFrame(enemy.action, enemy.frame);
    
    ctx.drawImage(
      enemySprite,
      col * FRAME_SIZE, row * FRAME_SIZE,
      FRAME_SIZE, FRAME_SIZE,
      enemy.x, enemy.y,
      FRAME_SIZE, FRAME_SIZE
    );
  }
  
  for (const seed of seeds) {
    ctx.beginPath();
    ctx.arc(seed.x, seed.y, SEED_SIZE, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

function gameLoop(currentTime) {
  update(currentTime);
  draw();
  requestAnimationFrame(gameLoop);
}

enemySprite.onload = () => {
  requestAnimationFrame(gameLoop);
};
</script>
</body>
</html>
