<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Animation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        canvas {
            border: 2px solid #fff;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const sprite = new Image();
        sprite.src = 'W6.png';
        
        const FRAME_SIZE = 64;
        const ANIMATION_SPEED = 150;
        
let character = {
  x: 200 - FRAME_SIZE / 2,
  y: 200 - FRAME_SIZE / 2,
  frame: 0,
  direction: 'idle',
  lastFrameTime: 0,
  lastInputTime: 0
};
        
const keys = {
  up: false,
  down: false,
  left: false,
  right: false,
  space: false
};
        
document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowUp': keys.up = true; break;
    case 'ArrowDown': keys.down = true; break;
    case 'ArrowLeft': keys.left = true; break;
    case 'ArrowRight': keys.right = true; break;
    case ' ': keys.space = true; break;
  }
  e.preventDefault();
});

document.addEventListener('keyup', (e) => {
  switch(e.key) {
    case 'ArrowUp': keys.up = false; break;
    case 'ArrowDown': keys.down = false; break;
    case 'ArrowLeft': keys.left = false; break;
    case 'ArrowRight': keys.right = false; break;
    case ' ': keys.space = false; break;
  }
  e.preventDefault();
});
        
        function drawGrid() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            
            for (let x = 0; x <= canvas.width; x += 64) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = 0; y <= canvas.height; y += 64) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }
        
function getSpriteFrame(direction, frameIndex) {
  let col, row;

  if (direction === 'down') {
    col = frameIndex % 2;
    row = 0;
  } else if (direction === 'up') {
    col = 2 + (frameIndex % 2);
    row = 0;
  } else if (direction === 'left') {
    col = frameIndex % 2;
    row = 1;
  } else if (direction === 'right') {
    col = 2 + (frameIndex % 2);
    row = 1;
  } else if (direction === 'space') {
    col = frameIndex % 4;
    row = 2;
  } else {
    col = frameIndex % 4;
    row = 3;
  }

  return { col, row };
}
        
function update(currentTime) {
  let newDirection = 'idle';
  let hasInput = keys.space || keys.down || keys.up || keys.right || keys.left;

  if (keys.space) newDirection = 'space';
  else if (keys.down) newDirection = 'down';
  else if (keys.up) newDirection = 'up';
  else if (keys.right) newDirection = 'right';
  else if (keys.left) newDirection = 'left';

  if (hasInput) {
    character.lastInputTime = currentTime;
  } else if (currentTime - character.lastInputTime > 3000) {
    newDirection = 'idle';
  }

  character.direction = newDirection;

  const speed = 3;
  if (keys.up) character.y -= speed;
  if (keys.down) character.y += speed;
  if (keys.left) character.x -= speed;
  if (keys.right) character.x += speed;

  character.x = Math.max(0, Math.min(canvas.width - FRAME_SIZE, character.x));
  character.y = Math.max(0, Math.min(canvas.height - FRAME_SIZE, character.y));

  if (currentTime - character.lastFrameTime > ANIMATION_SPEED) {
    character.frame++;
    character.lastFrameTime = currentTime;
  }
}
        
        function draw() {
            drawGrid();
            
            const { col, row } = getSpriteFrame(character.direction, character.frame);
            
            ctx.drawImage(
                sprite,
                col * FRAME_SIZE, row * FRAME_SIZE,
                FRAME_SIZE, FRAME_SIZE,
                character.x, character.y,
                FRAME_SIZE, FRAME_SIZE
            );
        }
        
        function gameLoop(currentTime) {
            update(currentTime);
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        sprite.onload = () => {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
